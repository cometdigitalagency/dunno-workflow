project:
  name: multi-provider-test
  repo: test/repo

tickets:
  source: file
  file:
    directory: ./tickets
    format: markdown

memory:
  enabled: true

monitoring:
  webhook_url: http://localhost:3000

events:
  task:
    description: Work assignment
    format: "TASK: {description}"
    direction: lead -> worker
  done:
    description: Worker done
    format: "DONE-{agent}"
    direction: worker -> lead

agents:
  lead:
    role: Lead
    description: Interactive lead agent
    interactive: true
    provider: claude
    model: sonnet
    tools: [read, bash]
    owns: { paths: [], never_edit: ["**/*"] }
    stack: []
    sends: [task]
    receives: [done]
    workflow:
      - "Take user input"
      - "Create tasks"
    rules:
      - "Do not write code"
    init:
      default: "I'm the lead. Give me work."
      test: "{default}"
      issue: "{default}"
    prompt_extra: ""

  worker:
    role: Worker
    description: Does the work using Codex
    interactive: false
    provider: codex
    model: o3
    tools: [read, edit, write, bash]
    owns: { paths: ["src/**"], never_edit: [] }
    stack: []
    sends: [done]
    receives: [task]
    workflow:
      - "Wait for TASK message"
      - "Execute task"
    rules:
      - "Follow existing patterns"
    init:
      default: "Wait for tasks."
      test: "{default}"
      issue: "{default}"
    prompt_extra: ""

layout:
  mode: auto
  debug_pane: false
