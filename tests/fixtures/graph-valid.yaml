project:
  name: valid-graph-test
  repo: test/repo

tickets:
  source: file
  file:
    directory: ./tickets

events:
  task:
    description: Work assignment
    format: "TASK: {description}"
    direction: lead -> worker
  done:
    description: Worker reports completion
    format: "DONE"
    direction: worker -> lead

agents:
  lead:
    role: Lead
    description: Interactive lead
    interactive: true
    model: sonnet
    tools: [read, bash]
    owns: { paths: [], never_edit: [] }
    stack: []
    sends: [task]
    receives: [done]
    workflow: ["Take input", "Dispatch tasks"]
    rules: []
    init:
      default: "Ready."
    prompt_extra: ""

  worker:
    role: Worker
    description: Does work
    interactive: false
    model: sonnet
    tools: [read, edit, bash]
    owns: { paths: ["src/**"], never_edit: [] }
    stack: []
    sends: [done]
    receives: [task]
    workflow: ["Wait for tasks", "Do work", "Report done"]
    rules: []
    init:
      default: "Waiting."
    prompt_extra: ""

layout:
  mode: auto
  debug_pane: false
