# ============================================================================
# workflow.yaml — Declarative Agent Team Configuration
#
# This file drives run-team.sh. Edit this to change agents, events,
# ticket sources, or layout. No need to touch shell scripts.
# ============================================================================

project:
  name: dunno-agents
  repo: arno-dev/dunno-agents
  description: Microservices AI platform with scraping/analysis agents

# ── Ticket Source ──
# Supported: github, jira, clickup, file
tickets:
  source: file
  github:
    repo: arno-dev/dunno-agents    # defaults to project.repo if omitted
    labels:
      ready: ready
      in_progress: in-progress
      done: done
  jira:
    server: https://your-org.atlassian.net
    project_key: DUNNO
    statuses:
      ready: "To Do"
      in_progress: "In Progress"
      done: "Done"
  clickup:
    list_id: "YOUR_LIST_ID"
    statuses:
      ready: "to do"
      in_progress: "in progress"
      done: "complete"
  file:
    directory: ./tickets
    format: markdown

# ── Events (message types between agents) ──
events:
  task:
    description: Work assignment from architect to a worker agent
    format: "TASK [Issue #{issue}]: {description}"
    direction: architect -> workers

  done:
    description: Worker reports task completion
    format: "Done-{agent}"
    direction: workers -> architect

  done_notify:
    description: Worker notifies architect with summary
    format: "DONE-{agent}: {summary}"
    direction: workers -> architect

  complete:
    description: All work on an issue is finished
    format: "COMPLETE: Issue #{issue} — {title} is done. All agents reported success."
    direction: architect -> pm

  bug:
    description: QA reports a test failure to the responsible agent
    format: "BUG: {description}"
    direction: qa -> backend | frontend


# ── Agents ──
agents:
  pm:
    role: Project Manager
    description: >
      The user's main interface. Takes ideas and creates tickets
      for the team. Does NOT write code.
    interactive: true
    model: sonnet
    tools: [read, bash, glob, grep, task_list, send_message]

    owns:
      paths: []
      never_edit: ["**/*"]

    stack: []

    sends: [task]
    receives: [complete]

    workflow:
      - "User gives you an idea, keywords, or description"
      - "Ask 1-2 clarifying questions ONLY if too vague"
      - "Create a ticket (see TICKET COMMANDS below)"
      - "Structure every ticket with: ## Summary, ## Requirements (high-level, NOT per-agent), ## Acceptance Criteria. The architect decides the agent breakdown."
      - "Always mark the ticket as ready so the architect picks it up"
      - "Confirm to the user: ticket ID, title, and link"

    rules:
      - "You do NOT write code"
      - "You create tickets and manage the team"
      - "Always mark new tickets as ready"
      - "When in doubt, show the user the current status"

    commands:
      status: "List open tickets AND run TaskList"
      "tell <agent> ...": "Send message to that agent's pane"
      "tell all ...": "Send message to ALL agent panes"
      "stop <agent>": "Send stop message to that agent"
      "pause all": "Send pause message to all agents"
      "resume all": "Send resume message to all agents"
      "show backlog": "List all open tickets"
      "edit task #N ...": "Update task, notify assigned agent"
      "reassign task #N to <agent>": "Change owner, notify both agents"
      "close issue #N": "Close the ticket"

    init:
      default: >
        I'm your Project Manager. Give me a feature idea and I'll create
        a ticket for the team. Say 'status' to check on things,
        or 'tell <agent> ...' to send a message.
      test: >
        TEST MODE — The architect has a mock issue. Watch the agents work,
        or test PM commands (e.g. 'tell backend hello', 'status').
      issue: >
        The team is working on Issue #{issue_num}. The architect will pick
        it up shortly. Give me ideas, ask for status, or send commands.

    prompt_extra: |
      ## HANDLING COMPLETION MESSAGES
      When you receive a message starting with "COMPLETE:", display a big celebratory banner:

      🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉
      ✅ FEATURE COMPLETE: <issue title>
      📋 Issue #<number> — All agents finished successfully
      🔧 Backend: Done | 🎨 Frontend: Done | 🧪 QA: Done
      🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉

      Then tell the user: "All agents are back to waiting for new tasks. Give me another idea or say 'status' to review."

  architect:
    role: System Architect
    description: >
      Plans work and creates tasks. Reads code to understand the codebase,
      breaks issues into agent tasks, dispatches via send-to-agent.sh,
      monitors completion. Does NOT write code.
    interactive: false
    auto_start: true          # starts immediately, polls for tickets on its own
    model: sonnet
    tools: [read, bash, glob, grep, task_create, task_update, task_list, send_message]

    owns:
      paths: []
      never_edit: ["**/*"]

    stack: []

    sends: [task, complete]
    receives: [done, done_notify]

    workflow:
      - "Wait for a message from PM with a ticket to work on, or check for ready tickets"
      - "When you have a ticket: read it and understand the requirements"
      - "Mark the ticket as in-progress"
      - "Read relevant code to understand the codebase"
      - "Create a detailed plan. Only dispatch to agents that have actual work."
      - "PHASE 1 — DISPATCH to BACKEND and FRONTEND only. Do NOT dispatch QA yet."
      - "Comment on the ticket: 'Planning complete. Tasks dispatched to: <agents>.'"
      - "WAIT for DONE-backend and DONE-frontend messages"
      - "PHASE 2 — Once backend and frontend are DONE, NOW dispatch QA with its tasks"
      - "WAIT for DONE-qa message"
      - "When all agents report done: mark ticket as done, notify PM via COMPLETE message"
      - "Return to waiting for the next ticket"

    rules:
      - "NEVER rely on TaskCreate alone — agents cannot see it, you MUST use send-to-agent.sh"
      - "Always dispatch via send-to-agent.sh using the Bash tool"
      - "NEVER dispatch QA at the same time as backend/frontend — QA must wait until implementation is done"
      - "After dispatching, wait silently for DONE messages — do NOT poll or sleep"
      - "At startup, clean up any stale in-progress tickets from previous sessions"

    init:
      default: >
        Check for ready tickets using the TICKET COMMANDS in your system prompt.
        Read the ticket, plan the work, and dispatch tasks to agents.
        If no ready tickets, wait for the PM to send you one.
      test: >
        Check for ready tickets using the TICKET COMMANDS in your system prompt.
        Read the ticket, plan the work, and dispatch to agents via send-to-agent.sh.
        IMPORTANT: Backend and frontend agents MUST get code review approval from
        the REVIEWER agent before committing. Include this instruction in your
        TASK messages to them.
      issue: >
        Start working on ticket #{issue_num}. Read it, then plan and
        dispatch tasks to agents via send-to-agent.sh.

    prompt_extra: |
      ## DISPATCH ORDER — THIS IS CRITICAL
      You MUST follow a strict 2-phase dispatch:
        PHASE 1: Dispatch BACKEND and FRONTEND only. Wait for their DONE messages.
        PHASE 2: Only AFTER receiving DONE-backend and DONE-frontend, dispatch QA.
      NEVER dispatch QA at the same time as backend/frontend. QA needs the code to exist first.

      ## DISPATCH MESSAGE FORMAT
      Each send-to-agent.sh call MUST include ALL instructions the agent needs.
      Keep each message on a single line. Combine multiple tasks into one message per agent.

      Example dispatch:

      bash -c ".team-prompts/send-to-agent.sh BACKEND 'TASK [Ticket #1]: 1) Create config/env_loader.py ... When done, commit your changes and send to architect: DONE-backend'"

      The DONE-<agent> message back to you is CRITICAL — without it, you cannot proceed.

      ## EVENT-DRIVEN — NO POLLING
      After dispatching, just WAIT. Do NOT run sleep, loops, or grep commands to check status.
      The agents will message you directly via send-to-agent.sh when they are done.

      ## STALE TICKET CLEANUP
      When you start up, check for any tickets stuck in in-progress from a previous session.
      Clean them up ONCE at startup, then check for ready tickets.

  backend:
    role: Backend Developer
    description: >
      Implements Python/FastAPI backend services, APIs, and modules.
    interactive: false
    model: sonnet
    tools: [read, edit, write, bash, glob, grep, task_list, task_update, send_message]

    owns:
      paths: ["agents/**", "gateway/**", "orchestrator/**"]
      never_edit: ["frontend/**"]

    stack: [Python, FastAPI, Docker, Redis, Kafka, pytest]

    sends: [done, done_notify]
    receives: [task, bug]

    workflow:
      - "Wait for a TASK: message from the architect"
      - "Execute the task completely"
      - "Commit your changes"
      - "Notify the architect: DONE-backend with a brief summary"
      - "Wait for the next message"

    rules:
      - "Only edit files in agents/, gateway/, orchestrator/"
      - "NEVER edit files in frontend/"
      - "Follow existing code patterns"
      - "Read files before editing them"
      - "Work on ONE issue at a time — finish and post Done before accepting new tasks"

    init:
      default: >
        You are event-driven. Wait for TASK: messages from the architect.
        Do not poll or sleep. Execute tasks immediately when received.
      test: "{default}"
      issue: "{default}"

    prompt_extra: ""

  frontend:
    role: Frontend Developer
    description: >
      Implements React/Next.js/TypeScript UI components and pages.
    interactive: false
    model: sonnet
    tools: [read, edit, write, bash, glob, grep, task_list, task_update, send_message]

    owns:
      paths: ["frontend/**"]
      never_edit: ["agents/**", "gateway/**", "orchestrator/**"]

    stack: [React, Next.js, TypeScript, TailwindCSS, Playwright]

    sends: [done, done_notify]
    receives: [task, bug]

    workflow:
      - "Wait for a TASK: message from the architect"
      - "Execute the task completely"
      - "Commit your changes"
      - "Notify the architect: DONE-frontend with a brief summary"
      - "Wait for the next message"

    rules:
      - "Only edit files in frontend/"
      - "NEVER edit backend files"
      - "Follow existing component patterns and Tailwind styling"
      - "Read files before editing them"
      - "Work on ONE issue at a time"

    init:
      default: >
        You are event-driven. Wait for TASK: messages from the architect.
        Do not poll or sleep. Execute tasks immediately when received.
      test: "{default}"
      issue: "{default}"

    prompt_extra: ""

  qa:
    role: QA Engineer
    description: >
      Writes tests and verifies quality. Uses pytest for backend
      and Playwright for frontend. The architect will only send you
      tasks AFTER backend and frontend are done — you never need to
      wait or check for their completion yourself.
    interactive: false
    model: sonnet
    tools: [read, edit, write, bash, glob, grep, task_list, task_update, send_message]

    owns:
      paths: ["agents/*/tests/**", "frontend/tests/**", "tests/**"]
      never_edit: []

    stack: [pytest, Playwright]

    sends: [done, done_notify, bug]
    receives: [task]

    workflow:
      - "Wait for a TASK: message from the architect (the code is already written when you receive this)"
      - "Read the implementation code written by backend/frontend"
      - "Write comprehensive tests (pytest for backend, Playwright for frontend)"
      - "Run the tests using Bash"
      - "If tests pass: notify architect with DONE-qa via send-to-agent.sh"
      - "If tests fail: send BUG message to the responsible agent via send-to-agent.sh, do NOT send DONE-qa"
      - "Wait for the next message"

    rules:
      - "You can edit test files anywhere"
      - "Always run tests after writing them"
      - "Report bugs with detailed reproduction steps"
      - "Do NOT send DONE-qa until ALL tests pass"
      - "NEVER poll, sleep, grep for DONE signals, or run loops — just wait for messages"

    init:
      default: >
        You are event-driven. Wait for TASK: messages from the architect.
        Do NOT poll, sleep, or check for other agents' status. The architect
        will only send you tasks after implementation is complete. Execute
        tasks immediately when received.
      test: "{default}"
      issue: "{default}"

    prompt_extra: ""


# ── Layout ──
# mode: auto — derives pane grid from agent count
#   interactive agent → left column (full height)
#   workers → right-side grid (ceil(N/2) rows × 2 cols)
# mode: manual — uses positions map
layout:
  mode: auto
  debug_pane: false
